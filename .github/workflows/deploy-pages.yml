name: Build v3.1.0 and Deploy ZIPs

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        luaVersion: [ "5.1", "5.2", "5.3", "5.4" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          # 明确指定 tree 路径
          luarocks make --tree ./local_tree "$spec"

      - name: Precise Collection and Zip
        shell: pwsh
        run: |
          $stage = "zip_stage"
          $luaVer = "${{ matrix.luaVersion }}"
          
          # 1. 创建目标目录
          New-Item -ItemType Directory -Force -Path "$stage/socket"
          New-Item -ItemType Directory -Force -Path "$stage/mime"

          # 2. 根据日志显示的路径，定点拷贝核心 DLL
          # 日志显示路径格式为: local_tree/lib/lua/<version>/<module>/core.dll
          $dllBase = "local_tree/lib/lua/$luaVer"
          
          if (Test-Path "$dllBase/socket/core.dll") {
              Copy-Item "$dllBase/socket/core.dll" -Destination "$stage/socket/" -Force
              Write-Host "Collected socket core.dll"
          } else { throw "Missing socket core.dll at $dllBase/socket/core.dll" }

          if (Test-Path "$dllBase/mime/core.dll") {
              Copy-Item "$dllBase/mime/core.dll" -Destination "$stage/mime/" -Force
              Write-Host "Collected mime core.dll"
          } else { throw "Missing mime core.dll at $dllBase/mime/core.dll" }

          # 3. 拷贝 Lua 脚本（从 src 目录获取最新的）
          $luaFiles = @("ltn12.lua", "mime.lua", "socket.lua")
          foreach ($f in $luaFiles) {
              if (Test-Path "src/$f") { Copy-Item "src/$f" -Destination "$stage/" }
          }
          if (Test-Path "src/socket") {
              Copy-Item "src/socket/*.lua" -Destination "$stage/socket/" -Force
          }

          # 4. 压缩
          $zipName = "luasocket-v3.1.0-lua$luaVer-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath "$zipName"
          
          New-Item -ItemType Directory -Force -Path "publish"
          Move-Item $zipName "publish/"

      - name: Upload Intermediate
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/*.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All ZIPs
        uses: actions/download-artifact@v4
        with:
          path: final-zips/
          merge-multiple: true

      - name: Generate Index HTML
        shell: bash
        run: |
          cd final-zips
          echo "<html><body style='font-family:sans-serif;padding:50px;'>" > index.html
          echo "<h1>LuaSocket v3.1.0 Windows Builds</h1><hr><ul>" >> index.html
          ls *.zip | sort | while read line; do
            echo "<li><a href='$line' style='line-height:2;font-size:1.2em;'>$line</a></li>" >> index.html
          done
          echo "</ul><p style='color:gray;margin-top:40px;'>Contains: socket/core.dll, mime/core.dll, and all .lua scripts.</p></body></html>" >> index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-zips
          publish_branch: gh-pages
          keep_files: false
