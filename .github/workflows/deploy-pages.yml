name: Build v3.1.0 and Deploy to Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        luaVersion: [ "5.4", "5.1" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          luarocks make -- "$spec"

      - name: Organize Artifacts
        shell: pwsh
        run: |
          $outPath = "publish/v3.1.0/lua${{ matrix.luaVersion }}/${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path "$outPath/socket"
          New-Item -ItemType Directory -Force -Path "$outPath/mime"

          # 提取 DLL
          $socketDll = Get-ChildItem -Path . -Filter "socket.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          $mimeDll = Get-ChildItem -Path . -Filter "mime.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          if ($socketDll) { Copy-Item $socketDll -Destination "$outPath/socket/core.dll" -Force }
          if ($mimeDll) { Copy-Item $mimeDll -Destination "$outPath/mime/core.dll" -Force }

          # 拷贝 Lua 脚本
          if (Test-Path "src") {
              Copy-Item "src/*.lua" -Destination "$outPath/" -ErrorAction SilentlyContinue
          }

          # --- 关键修改：在当前架构目录下生成 index.html ---
          $indexContent = "<html><body><h1>Files for Lua${{ matrix.luaVersion }} ${{ matrix.arch }}</h1><ul>"
          Get-ChildItem -Path $outPath -Recurse | ForEach-Object {
              $relPath = $_.FullName.Replace((Get-Item $outPath).FullName, "").TrimStart("\").Replace("\", "/")
              if ($relPath) { $indexContent += "<li><a href='./$relPath'>$relPath</a></li>" }
          }
          $indexContent += "</ul><a href='../../'>Back</a></body></html>"
          Set-Content -Path "$outPath/index.html" -Value $indexContent

      - name: Upload Intermediate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: final-dist/
          merge-multiple: true

      - name: Generate Root Index
        run: |
          cd final-dist
          echo "<html><body><h1>LuaSocket Builds Index</h1><ul>" > index.html
          find . -name "index.html" -not -path "./index.html" | sort | while read -r file; do
            dir=$(dirname "$file" | sed 's|./||')
            echo "<li><a href=\"$dir/\">$dir</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-dist
          publish_branch: gh-pages
          keep_files: true
