name: Build v3.1.0 All Versions and Deploy ZIPs

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # 支持手动点击运行

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        # 补全了从 5.1 到 5.4 的所有主流版本
        luaVersion: [ "5.1", "5.2", "5.3", "5.4" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          luarocks make -- "$spec"

      - name: Organize and Zip
        shell: pwsh
        run: |
          # 1. 创建符合 Lua 加载规则的目录结构
          $stage = "stage"
          New-Item -ItemType Directory -Force -Path "$stage/socket"
          New-Item -ItemType Directory -Force -Path "$stage/mime"

          # 2. 提取并重命名 DLL (核心逻辑：socket.dll -> socket/core.dll)
          $socketDll = Get-ChildItem -Path . -Filter "socket.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          $mimeDll = Get-ChildItem -Path . -Filter "mime.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          
          if ($socketDll) { Copy-Item $socketDll -Destination "$stage/socket/core.dll" -Force }
          if ($mimeDll) { Copy-Item $mimeDll -Destination "$stage/mime/core.dll" -Force }
          
          # 3. 拷贝所有配套的 .lua 脚本
          if (Test-Path "src") {
              Copy-Item "src/*.lua" -Destination "$stage/" -ErrorAction SilentlyContinue
          }

          # 4. 打包成 ZIP
          $zipName = "luasocket-v3.1.0-lua${{ matrix.luaVersion }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath "$zipName"
          
          # 5. 准备上传
          New-Item -ItemType Directory -Force -Path "publish"
          Move-Item $zipName "publish/"

      - name: Upload Intermediate
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/*.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All ZIPs
        uses: actions/download-artifact@v4
        with:
          path: final-zips/
          merge-multiple: true

      - name: Generate Index HTML
        shell: python
        run: |
          import os
          from datetime import datetime

          zips = [f for f in os.listdir('final-zips') if f.endswith('.zip')]
          zips.sort()
          
          with open('final-zips/index.html', 'w', encoding='utf-8') as f:
              f.write("<html><head><title>LuaSocket v3.1.0 Downloads</title>")
              f.write("<style>body{font-family:sans-serif;padding:40px;} li{margin:10px 0;} a{text-decoration:none;color:#0366d6;} a:hover{text-decoration:underline;}</style>")
              f.write("</head><body>")
              f.write("<h1>LuaSocket v3.1.0 Windows Builds</h1>")
              f.write("<p><b>Usage:</b> Extract the ZIP to your project. It includes the required <code>socket/core.dll</code> and <code>mime/core.dll</code> structure.</p>")
              f.write("<hr><ul>")
              for z in zips:
                  f.write(f'<li><a href="{z}">📦 {z}</a></li>')
              f.write("</ul><hr>")
              f.write(f"<p style='color:grey'>Last Updated: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')} UTC</p>")
              f.write("</body></html>")

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-zips
          publish_branch: gh-pages
          keep_files: false # 保持干净，每次运行只保留这 8 个最新的 ZIP
