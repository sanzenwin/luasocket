name: Build v3.1.0 and Deploy to Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        luaVersion: [ "5.4", "5.1" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          luarocks make -- "$spec"

      - name: Organize Artifacts
        shell: pwsh
        run: |
          $outPath = "publish/v3.1.0/lua${{ matrix.luaVersion }}/${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path "$outPath/socket"
          New-Item -ItemType Directory -Force -Path "$outPath/mime"

          $socketDll = Get-ChildItem -Path . -Filter "socket.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          $mimeDll = Get-ChildItem -Path . -Filter "mime.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          if ($socketDll) { Copy-Item $socketDll -Destination "$outPath/socket/core.dll" -Force }
          if ($mimeDll) { Copy-Item $mimeDll -Destination "$outPath/mime/core.dll" -Force }
          if (Test-Path "src") { Copy-Item "src/*.lua" -Destination "$outPath/" -ErrorAction SilentlyContinue }

      - name: Upload Intermediate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: final-dist/
          merge-multiple: true

      - name: Python Recursive Index Generator
        shell: python
        run: |
          import os

          root_dir = os.path.abspath("final-dist")

          for root, dirs, files in os.walk(root_dir):
              # 准备 HTML 内容
              rel_path = os.path.relpath(root, root_dir)
              display_path = "Root" if rel_path == "." else rel_path
              
              html = [f"<html><head><title>Index of {display_path}</title></head>"]
              html.append(f"<body><h1>Index of {display_path}</h1><hr><ul>")
              
              # 添加上级目录链接
              if rel_path != ".":
                  html.append('<li><a href="../">.. (Parent Directory)</a></li>')
              
              # 添加子目录链接
              for d in sorted(dirs):
                  html.append(f'<li><a href="{d}/">{d}/</a></li>')
              
              # 添加文件链接
              for f in sorted(files):
                  if f == "index.html": continue
                  html.append(f'<li><a href="{f}">{f}</a></li>')
              
              html.append("</ul><hr></body></html>")
              
              # 写入该目录下的 index.html
              with open(os.path.join(root, "index.html"), "w", encoding="utf-8") as f:
                  f.write("\n".join(html))

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-dist
          publish_branch: gh-pages
          keep_files: true
