name: Build v3.1.0 and Deploy ZIPs

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        luaVersion: [ "5.4", "5.1" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          luarocks make -- "$spec"

      - name: Organize and Zip
        shell: pwsh
        run: |
          # 创建临时整理目录
          $stage = "stage/socket"
          $mimeStage = "stage/mime"
          New-Item -ItemType Directory -Force -Path $stage
          New-Item -ItemType Directory -Force -Path $mimeStage

          # 提取 DLL 并规范化命名
          $socketDll = Get-ChildItem -Path . -Filter "socket.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          $mimeDll = Get-ChildItem -Path . -Filter "mime.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          if ($socketDll) { Copy-Item $socketDll -Destination "$stage/core.dll" }
          if ($mimeDll) { Copy-Item $mimeDll -Destination "$mimeStage/core.dll" }
          
          # 拷贝 Lua 脚本到 stage 根目录
          if (Test-Path "src") { Copy-Item "src/*.lua" -Destination "stage/" }

          # 打包成 ZIP
          $zipName = "luasocket-v3.1.0-lua${{ matrix.luaVersion }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "stage/*" -DestinationPath "$zipName"
          
          # 准备上传
          New-Item -ItemType Directory -Force -Path "publish"
          Move-Item $zipName "publish/"

      - name: Upload Intermediate
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/*.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All ZIPs
        uses: actions/download-artifact@v4
        with:
          path: final-zips/
          merge-multiple: true

      - name: Generate Simple Index
        shell: python
        run: |
          import os
          zips = [f for f in os.listdir('final-zips') if f.endswith('.zip')]
          zips.sort()
          
          with open('final-zips/index.html', 'w') as f:
              f.write("<html><head><title>LuaSocket v3.1.0 Download</title></head><body>")
              f.write("<h1>LuaSocket v3.1.0 Windows Builds (ZIP)</h1>")
              f.write("<p>Each ZIP contains: socket/core.dll, mime/core.dll, and all .lua scripts.</p><ul>")
              for z in zips:
                  f.write(f'<li><a href="{z}"><strong>{z}</strong></a></li>')
              f.write("</ul><hr><p>Build Time: " + os.popen('date').read() + "</p></body></html>")

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-zips
          publish_branch: gh-pages
          keep_files: false # 每次运行都以最新的 ZIP 为准，清空旧的防止混乱
