name: Build v3.1.0 and Deploy to Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # 支持在 Actions 页面手动点击运行

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        # 你可以根据需要添加 5.3, 5.2 等
        luaVersion: [ "5.4", "5.1" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
        
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          # 动态查找 rockspec 文件名，避免版本号变动导致的 File Not Found
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          Write-Host "Using rockspec: $spec"
          luarocks make -- "$spec"
        env:
          DEBUG: DEBUG

      - name: Organize Artifacts
        shell: pwsh
        run: |
          $outPath = "publish/v3.1.0/lua${{ matrix.luaVersion }}/${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path "$outPath/socket"
          New-Item -ItemType Directory -Force -Path "$outPath/mime"

          # 递归搜索所有目录，防止 LuaRocks 把 DLL 产物放在非预期位置
          # 找到后强制重命名为 core.dll 并移动到 publish 目录
          $socketDll = Get-ChildItem -Path . -Filter "socket.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          $mimeDll = Get-ChildItem -Path . -Filter "mime.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1

          if ($socketDll) { 
              Copy-Item $socketDll -Destination "$outPath/socket/core.dll" -Force 
              Write-Host "Found and copied socket.dll from $socketDll"
          }
          if ($mimeDll) { 
              Copy-Item $mimeDll -Destination "$outPath/mime/core.dll" -Force 
              Write-Host "Found and copied mime.dll from $mimeDll"
          }

          # 拷贝 Lua 脚本组件 (http.lua, url.lua 等)
          if (Test-Path "src") {
              Copy-Item "src/*.lua" -Destination "$outPath/" -ErrorAction SilentlyContinue
          }

      - name: Upload Intermediate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: final-dist/
          merge-multiple: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-dist
          publish_branch: gh-pages
          keep_files: true # 允许不同架构、不同 Lua 版本的产物在同一分支共存
