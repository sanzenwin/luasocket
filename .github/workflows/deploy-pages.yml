name: Build v3.1.0 and Deploy ZIPs

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        luaVersion: [ "5.1", "5.2", "5.3", "5.4" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          # 强制安装到当前目录的 local_tree 文件夹
          luarocks make --tree ./local_tree "$spec"

      - name: "Debug: List All Files"
        shell: pwsh
        run: |
          Write-Host "--- START OF DIRECTORY LOG ---"
          # 打印当前目录下所有文件及子目录
          Get-ChildItem -Path . -Recurse | Select-Object FullName
          Write-Host "--- END OF DIRECTORY LOG ---"

      - name: Organize and Zip
        shell: pwsh
        run: |
          $stage = "final_stage"
          New-Item -ItemType Directory -Force -Path "$stage/socket"
          New-Item -ItemType Directory -Force -Path "$stage/mime"

          # 搜索所有的 dll
          $sDll = Get-ChildItem -Path . -Filter "socket.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          $mDll = Get-ChildItem -Path . -Filter "mime.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1

          if ($sDll) { 
              Copy-Item $sDll -Destination "$stage/socket/core.dll" -Force 
              Write-Host "Captured socket.dll from $sDll"
          }
          if ($mDll) { 
              Copy-Item $mDll -Destination "$stage/mime/core.dll" -Force 
              Write-Host "Captured mime.dll from $mDll"
          }

          if (Test-Path "src") {
              Copy-Item "src/*.lua" -Destination "$stage/" -ErrorAction SilentlyContinue
          }

          # 打包 ZIP
          $zipName = "luasocket-v3.1.0-lua${{ matrix.luaVersion }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath "$zipName"
          
          New-Item -ItemType Directory -Force -Path "publish"
          Move-Item $zipName "publish/"

      - name: Upload Intermediate
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/*.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All ZIPs
        uses: actions/download-artifact@v4
        with:
          path: final-zips/
          merge-multiple: true

      - name: Generate Index HTML
        run: |
          cd final-zips
          echo "<html><body style='font-family:sans-serif;padding:50px;'>" > index.html
          echo "<h1>LuaSocket v3.1.0 Windows Builds</h1><hr><ul>" >> index.html
          # 列出所有 zip 文件并生成链接
          ls *.zip | sort | while read line; do
            echo "<li><a href='$line' style='line-height:2;font-size:1.2em;'>$line</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-zips
          publish_branch: gh-pages
          keep_files: false
