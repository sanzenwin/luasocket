name: Build v3.1.0 and Deploy to Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        luaVersion: [ "5.4", "5.1" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
        
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          # 动态匹配 rockspec 文件名
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          Write-Host "Using rockspec: $spec"
          luarocks make -- "$spec"
        env:
          DEBUG: DEBUG

      - name: Organize Artifacts
        shell: pwsh
        run: |
          $outPath = "publish/v3.1.0/lua${{ matrix.luaVersion }}/${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path "$outPath/socket"
          New-Item -ItemType Directory -Force -Path "$outPath/mime"

          # 递归搜索并将 socket.dll/mime.dll 规范化为 core.dll
          $socketDll = Get-ChildItem -Path . -Filter "socket.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1
          $mimeDll = Get-ChildItem -Path . -Filter "mime.dll" -Recurse | Select-Object -ExpandProperty FullName -First 1

          if ($socketDll) { Copy-Item $socketDll -Destination "$outPath/socket/core.dll" -Force }
          if ($mimeDll) { Copy-Item $mimeDll -Destination "$outPath/mime/core.dll" -Force }

          # 拷贝 Lua 脚本组件
          if (Test-Path "src") {
              Copy-Item "src/*.lua" -Destination "$outPath/" -ErrorAction SilentlyContinue
          }

      - name: Upload Intermediate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: final-dist/
          merge-multiple: true

      - name: Generate Index Page
        run: |
          cd final-dist
          echo "<html><head><title>LuaSocket v3.1.0 Builds</title></head><body>" > index.html
          echo "<h1>LuaSocket v3.1.0 Windows Builds</h1><ul>" >> index.html
          # 查找所有包含 core.dll 的目录并生成链接
          find . -type d -not -path '*/.*' -not -path '.' | sort | while read -r dir; do
            clean_dir=$(echo $dir | sed 's|./||')
            echo "<li><a href=\"$clean_dir/\">$clean_dir</a></li>" >> index.html
          done
          echo "</ul><hr><p>Generated by GitHub Actions</p></body></html>" >> index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-dist
          publish_branch: gh-pages
          keep_files: true
