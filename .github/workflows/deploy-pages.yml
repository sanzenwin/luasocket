name: Build v3.1.0 All Versions and Deploy ZIPs

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        luaVersion: [ "5.1", "5.2", "5.3", "5.4" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          # 强制指定在当前目录安装，方便提取产物
          luarocks make --tree ./install_tree "$spec"

      - name: Organize and Zip (Python Deep Search)
        shell: python
        run: |
          import os
          import shutil
          import zipfile

          # 1. 创建 stage 结构
          os.makedirs("stage/socket", exist_ok=True)
          os.makedirs("stage/mime", exist_ok=True)

          # 2. 暴力搜索 DLL
          # luarocks 在 Windows 编译后可能把 dll 放在 ./install_tree/lib 或 ./src
          for root, dirs, files in os.walk("."):
              for f in files:
                  full_path = os.path.join(root, f)
                  # 找到 socket.dll 或核心 dll
                  if f.lower() == "socket.dll" or (f.lower() == "core.dll" and "socket" in root.lower()):
                      shutil.copy2(full_path, "stage/socket/core.dll")
                      print(f"Found Socket DLL at: {full_path}")
                  elif f.lower() == "mime.dll" or (f.lower() == "core.dll" and "mime" in root.lower()):
                      shutil.copy2(full_path, "stage/mime/core.dll")
                      print(f"Found Mime DLL at: {full_path}")

          # 3. 拷贝 Lua 脚本 (通常在 src 目录下)
          src_dir = "src"
          if os.path.exists(src_dir):
              for f in os.listdir(src_dir):
                  if f.endswith(".lua"):
                      shutil.copy2(os.path.join(src_dir, f), "stage/")

          # 4. 检查是否真的抓到了 DLL，没抓到就报错阻止发布
          if not os.path.exists("stage/socket/core.dll"):
              raise Exception("CRITICAL ERROR: socket/core.dll not found after build!")

          # 5. 打包 ZIP
          zip_name = f"luasocket-v3.1.0-lua${{ matrix.luaVersion }}-${{ matrix.arch }}.zip"
          with zipfile.ZipFile(zip_name, 'w', zipfile.ZIP_DEFLATED) as z:
              for root, dirs, files in os.walk("stage"):
                  for f in files:
                      fp = os.path.join(root, f)
                      # 保持 stage 内部的相对路径
                      arcname = os.path.relpath(fp, "stage")
                      z.write(fp, arcname)
          
          os.makedirs("publish", exist_ok=True)
          shutil.move(zip_name, os.path.join("publish", zip_name))

      - name: Upload Intermediate
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/*.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All ZIPs
        uses: actions/download-artifact@v4
        with:
          path: final-zips/
          merge-multiple: true

      - name: Generate Index HTML
        shell: python
        run: |
          import os
          zips = sorted([f for f in os.listdir('final-zips') if f.endswith('.zip')])
          with open('final-zips/index.html', 'w', encoding='utf-8') as f:
              f.write("<html><body><h1>LuaSocket v3.1.0 Windows Builds</h1><ul>")
              for z in zips:
                  f.write(f'<li><a href="{z}">📦 {z}</a></li>')
              f.write("</ul></body></html>")

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-dist
          publish_branch: gh-pages
          keep_files: false
