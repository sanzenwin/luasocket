name: Build v3.1.0 and Deploy ZIPs

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Lua ${{ matrix.luaVersion }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        luaVersion: [ "5.1", "5.2", "5.3", "5.4" ]
        platform: [ "windows-2022" ]
        arch: [ "x64", "x86" ]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout v3.1.0
        uses: actions/checkout@v4
        with:
          ref: v3.1.0

      - name: Setup 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup 'lua'
        uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup 'luarocks'
        uses: luarocks/gh-actions-luarocks@master

      - name: Make and Build
        shell: pwsh
        run: |
          $spec = Get-ChildItem -Path . -Filter "luasocket*.rockspec" | Select-Object -ExpandProperty Name -First 1
          # 关键：指定安装树，防止 DLL 被塞进系统临时文件夹
          luarocks make --tree ./local_tree "$spec"

      - name: Organize and Zip (Python Deep Search)
        shell: python
        run: |
          import os, shutil, zipfile

          # 1. 创建符合 Lua 规范的结构
          base_dir = "stage"
          os.makedirs(f"{base_dir}/socket", exist_ok=True)
          os.makedirs(f"{base_dir}/mime", exist_ok=True)

          # 2. 暴力搜索 DLL。无论在 local_tree 还是 src 还是根目录，全给找出来
          for root, dirs, files in os.walk("."):
              for f in files:
                  full_path = os.path.join(root, f).replace("\\", "/")
                  if "stage" in full_path: continue # 避开自己
                  
                  if f.lower() == "socket.dll":
                      shutil.copy2(full_path, f"{base_dir}/socket/core.dll")
                      print(f"Captured: {full_path} -> socket/core.dll")
                  elif f.lower() == "mime.dll":
                      shutil.copy2(full_path, f"{base_dir}/mime/core.dll")
                      print(f"Captured: {full_path} -> mime/core.dll")

          # 3. 拷贝 Lua 源码
          src_dir = "src"
          if os.path.exists(src_dir):
              for f in os.listdir(src_dir):
                  if f.endswith(".lua"):
                      shutil.copy2(os.path.join(src_dir, f), base_dir)

          # 4. 安全检查：如果没搜到 DLL，直接报错，不浪费时间发布
          if not os.path.exists(f"{base_dir}/socket/core.dll"):
              raise Exception("Error: socket.dll was not found after build!")

          # 5. 打包
          zip_name = f"luasocket-v3.1.0-lua${{ matrix.luaVersion }}-${{ matrix.arch }}.zip"
          with zipfile.ZipFile(zip_name, 'w', zipfile.ZIP_DEFLATED) as z:
              for r, d, fs in os.walk(base_dir):
                  for file in fs:
                      fp = os.path.join(r, file)
                      z.write(fp, os.path.relpath(fp, base_dir))
          
          os.makedirs("publish", exist_ok=True)
          shutil.move(zip_name, f"publish/{zip_name}")

      - name: Upload Intermediate
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.luaVersion }}-${{ matrix.arch }}
          path: publish/*.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All ZIPs
        uses: actions/download-artifact@v4
        with:
          path: final-zips/
          merge-multiple: true

      - name: Generate Simple Index
        shell: python
        run: |
          import os
          zips = sorted([f for f in os.listdir('final-zips') if f.endswith('.zip')])
          with open('final-zips/index.html', 'w', encoding='utf-8') as f:
              f.write("<html><body style='font-family:sans-serif; padding:50px;'>")
              f.write("<h1>LuaSocket v3.1.0 Downloads (ZIP)</h1><ul>")
              for z in zips:
                  f.write(f'<li><a href="{z}" style="font-size:1.2em; line-height:2;">{z}</a></li>')
              f.write("</ul><p style='margin-top:50px; color:gray;'>Contains: socket/core.dll, mime/core.dll and lua scripts.</p>")
              f.write("</body></html>")

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./final-zips
          publish_branch: gh-pages
          keep_files: false
